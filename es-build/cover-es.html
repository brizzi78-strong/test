<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<style>
  @page { size: 1320px 1904px; margin: 0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1320px; height:1904px; }
  .cov { position:relative; width:1320px; height:1904px; overflow:hidden;
         font-family: Georgia, "Times New Roman", serif; }
  .cov > img.art { position:absolute; inset:0; width:1320px; height:1904px; object-fit:cover; }
  .mask { position:absolute; left:0; right:0; top:50%; bottom:0;
          background: linear-gradient(to bottom,
                      rgba(3,7,18,0) 0%, rgba(3,7,18,1) 3.5%, #030712 45%, #04070f 100%); }
  .blurb { position:absolute; left:8%; right:8%; top:4.3%; text-align:center;
           color:#d8d4cb; font-style:italic; font-size:39px; line-height:1.32; }
  .blurb .attr { display:block; font-style:normal; font-size:24px; letter-spacing:0.07em;
                 margin-top:14px; color:#b3ada1; }
  .title { position:absolute; left:6%; right:6%; top:65.5%; text-align:center;
           color:#f3f1ea; letter-spacing:0.04em; line-height:1.03;
           font-size:150px; font-weight:400; }
  .sub { position:absolute; left:9%; right:9%; top:83%; text-align:center;
         color:#c9c4b6; font-style:italic; font-size:41px; letter-spacing:0.02em; }
  .auth { position:absolute; left:0; right:0; top:90.5%; text-align:center;
          color:#eceae2; font-size:60px; letter-spacing:0.18em; }
</style></head><body>
<div class="cov">
  <img class="art" src="cover/cardinal-front-v5.jpg" alt="">
  <div class="mask"></div>
  <div class="blurb">“Conozco a este hombre desde hace treinta y cinco años. Puedes confiar en lo que estás a punto de leer.”<span class="attr">— DAVE MEYER, ex-quarterback de la NFL</span></div>
  <div class="title">LA PROMESA<br>DEL CARDENAL</div>
  <div class="sub">Memorias del Padre Que Se Quedó</div>
  <div class="auth">ROB BRIZZI</div>
</div>
</body></html>
