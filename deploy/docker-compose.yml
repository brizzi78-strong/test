# Run the whole Cardinal HR platform — all seven services plus the static
# website — with one command:
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Each service runs the same image (built once) with a different command, port,
# and durable SQLite volume. The website is served by nginx from cardinal-hr/.
name: cardinal-hr

x-service: &service
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: cardinalhr/services:local
  restart: unless-stopped

services:
  recruiting:
    <<: *service
    command: node recruiting/src/index.ts
    environment:
      PORT: "3200"
      RECRUITING_DB: /data/recruiting.db
    ports: ["3200:3200"]
    volumes: ["recruiting-data:/data"]

  hirecheck:
    <<: *service
    command: node hirecheck/src/index.ts
    environment:
      PORT: "3000"
      HIRECHECK_DB: /data/hirecheck.db
      # Set HIRECHECK_PROVIDER=equifax (+ EQUIFAX_BASE_URL / EQUIFAX_API_KEY)
      # to use the real provider instead of the mock.
    ports: ["3000:3000"]
    volumes: ["hirecheck-data:/data"]

  myhr:
    <<: *service
    command: node myhr/src/index.ts
    environment:
      PORT: "3100"
      MYHR_DB: /data/myhr.db
    ports: ["3100:3100"]
    volumes: ["myhr-data:/data"]

  training:
    <<: *service
    command: node training/src/index.ts
    environment:
      PORT: "3300"
      TRAINING_DB: /data/training.db
    ports: ["3300:3300"]
    volumes: ["training-data:/data"]

  benefits:
    <<: *service
    command: node benefits/src/index.ts
    environment:
      PORT: "3400"
      BENEFITS_DB: /data/benefits.db
    ports: ["3400:3400"]
    volumes: ["benefits-data:/data"]

  payroll:
    <<: *service
    command: node payroll/src/index.ts
    environment:
      PORT: "3500"
      PAYROLL_DB: /data/payroll.db
    ports: ["3500:3500"]
    volumes: ["payroll-data:/data"]

  directory:
    <<: *service
    command: node directory/src/index.ts
    environment:
      PORT: "3600"
      DIRECTORY_DB: /data/directory.db
    ports: ["3600:3600"]
    volumes: ["directory-data:/data"]

  timeoff:
    <<: *service
    command: node timeoff/src/index.ts
    environment:
      PORT: "3700"
      TIMEOFF_DB: /data/timeoff.db
    ports: ["3700:3700"]
    volumes: ["timeoff-data:/data"]

  # Public API entry point: authenticates every request and proxies to the
  # services above (reachable by their compose service names on the internal
  # network). Set GATEWAY_ADMIN_TOKEN in your environment to issue keys.
  gateway:
    <<: *service
    command: node gateway/src/index.ts
    environment:
      PORT: "8080"
      GATEWAY_DB: /data/gateway.db
      GATEWAY_ADMIN_TOKEN: ${GATEWAY_ADMIN_TOKEN:-}
    ports: ["8080:8080"]
    volumes: ["gateway-data:/data"]
    depends_on:
      - recruiting
      - hirecheck
      - myhr
      - training
      - benefits
      - payroll
      - directory
      - timeoff

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["8081:80"]
    volumes:
      - ../cardinal-hr:/usr/share/nginx/html:ro

volumes:
  recruiting-data:
  hirecheck-data:
  myhr-data:
  training-data:
  benefits-data:
  payroll-data:
  directory-data:
  timeoff-data:
  gateway-data:
