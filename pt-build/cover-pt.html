<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
  @page { size: 1320px 1904px; margin: 0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1320px; height:1904px; }
  .cov { position:relative; width:1320px; height:1904px; overflow:hidden;
         font-family: Georgia, "Times New Roman", serif; }
  .cov > img.art { position:absolute; inset:0; width:1320px; height:1904px; object-fit:cover; }
  /* Opaque panel threaded between the tail (0.539) and the English title (0.550) */
  .mask { position:absolute; left:0; right:0; top:50%; bottom:0;
          background: linear-gradient(to bottom,
                      rgba(3,7,18,0) 0%, rgba(3,7,18,1) 3.5%, #030712 45%, #04070f 100%); }
  .title { position:absolute; left:6%; right:6%; top:65.5%; text-align:center;
           color:#f3f1ea; letter-spacing:0.04em; line-height:1.03;
           font-size:150px; font-weight:400; }
  .sub { position:absolute; left:10%; right:10%; top:83%; text-align:center;
         color:#c9c4b6; font-style:italic; font-size:42px; letter-spacing:0.02em; }
  .auth { position:absolute; left:0; right:0; top:90.5%; text-align:center;
          color:#eceae2; font-size:60px; letter-spacing:0.18em; }
</style></head><body>
<div class="cov">
  <img class="art" src="cover/cardinal-front-v5.jpg" alt="">
  <div class="mask"></div>
  <div class="title">A PROMESSA<br>DO CARDEAL</div>
  <div class="sub">Memórias do Pai Que Ficou</div>
  <div class="auth">ROB BRIZZI</div>
</div>
</body></html>
