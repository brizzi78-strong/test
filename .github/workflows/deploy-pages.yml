name: Deploy website to GitHub Pages

# Publishes the static site in ./website to GitHub Pages on every push.
on:
  push:
    branches:
      - main
      - claude/undectable-ai-connect-69uont
    paths:
      - "website/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions required for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (Actions source) so no manual repo
          # setting is required for the first deploy.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
